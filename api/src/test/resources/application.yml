spring:
  mail:
    host: localhost
    port: 1025
  jpa:
    hibernate:
      ddl-auto: create-drop

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${TEST_GOOGLE_CLIENT_ID:test-client-id}
            client-secret: ${TEST_GOOGLE_CLIENT_SECRET:mock-client-secret}

app:
  jwt:
    secret: ${TEST_JWT_SECRET:dGVzdHNlY3JldGtleXRlc3RzZWNyZXRrZXl0ZXN0c2VjcmV0a2V5}
    expiration-ms: 86400000

  oauth2:
    redirect-uri: http://localhost:5173/auth/callback
