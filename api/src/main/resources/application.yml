server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:file:.env[.properties]

  profiles:
    active: dev

  application:
    name: smart-campus-api

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:smartcampus}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 16MB

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

logging:
  level:
    org.springframework.mail: DEBUG
    com.smartcampus.api.service.EmailService: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET_KEY}
    expiration-ms: 86400000
  oauth2:
    redirect-uri: http://localhost:5173/auth/callback
  storage:
    supabase:
      url: ${SUPABASE_URL:}
      service-key: ${SUPABASE_SERVICE_KEY:}
      bucket: ${SUPABASE_BUCKET:incident-images}
  init:
    admin-password: ${INIT_ADMIN_PASSWORD:admin123}
    staff-password: ${INIT_STAFF_PASSWORD:staff123}
    student-password: ${INIT_STUDENT_PASSWORD:student123}
